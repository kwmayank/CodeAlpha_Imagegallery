<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
    <h1 class="title"> Image Gallery</h1>

    <div class="filter-buttons">
        <button class="active" data-filter="all">All</button>
        <button data-filter="nature"> Nature</button>
        <button data-filter="city"> City</button>
        <button data-filter="animals"> Animals</button>
    </div>

    <div class="gallery">
        <div class="card nature">
            <img src="https://picsum.photos/id/1015/600/400" alt="Nature" loading="lazy" />
            <div class="overlay"><span> Nature</span></div>
        </div>
        <div class="card city">
            <img src="https://picsum.photos/id/1011/600/400" alt="City" loading="lazy" />
            <div class="overlay"><span> City</span></div>
        </div>
        <div class="card animals">
            <img src="https://picsum.photos/id/1025/600/400" alt="Animals" loading="lazy" />
            <div class="overlay"><span> Animals</span></div>
        </div>
        <div class="card nature">
            <img src="https://picsum.photos/id/1040/600/400" alt="Nature" loading="lazy" />
            <div class="overlay"><span> Nature</span></div>
        </div>
        <div class="card city">
            <img src="https://picsum.photos/id/1031/600/400" alt="City" loading="lazy" />
            <div class="overlay"><span> City</span></div>
        </div>
        <div class="card animals">
            <img src="https://picsum.photos/id/237/600/400" alt="Animals" loading="lazy" />
            <div class="overlay"><span> Animals</span></div>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox">
    <span class="close">&times;</span>
    <button class="prev">&#10094;</button>
    <img class="lightbox-img" src="" alt="Lightbox Image" />
    <button class="next">&#10095;</button>
</div>

<script src="script.js"></script>
</body>
</html>
